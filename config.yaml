# 小红书一键发布配置文件
# 首次使用前请填写以下配置

# ===== Google AI Studio 配置（图片生成）=====
# 使用 Gemini 3 Pro Image Preview 生成封面图和内容图
# 官网：https://aistudio.google
gemini:
  api_key: "{YOUR_GEMINI_API_KEY}"  # 替换为你的 API Key
  endpoint: "https://aistudio.google"
  model: "gemini-3-pro-image-preview"
  # 图片生成参数
  image_generation:
    size: "1080x1440"  # 小红书3:4竖版
    quality: "high"
    style: "vivid"

# ===== myaibo API 配置 =====
# 用于发布到小红书草稿箱
# 官网：https://www.myaibot.vip/
# API文档：https://www.myaibot.vip/docs/api
# 核心接口：https://www.myaibot.vip/api/rednote/publish
# 免费版：每日10次调用额度 | 付费版：0.1元/次 | 包月：99元/1000次
myaibo:
  api_key: "rn_a79b2aadf1e6aa8dcbd85b999298216b39969a5f1330ecd45c557862f020"
  api_base: "https://www.myaibot.vip/api"
  endpoints:
    publish: "/rednote/publish"

# ===== 账号信息 =====
# 用于水印、IP建设、个性化内容
account:
  name: "你的小红书昵称"  # 替换为你的昵称
  avatar: ""  # 可选：头像图片路径
  bio: ""     # 可选：个人简介/定位

  # 账号类型/领域（影响配色和风格）
  # 可选值：beauty, fashion, fitness, education, daily, relationship, career, travel
  category: "daily"

# ===== 内容风格配置 =====
style:
  # 默认图片尺寸（小红书标准 3:4）
  image_width: 1080
  image_height: 1440

  # 每页文字量范围
  min_chars_per_page: 80
  max_chars_per_page: 120

  # 总页数范围
  min_pages: 6
  max_pages: 9

  # 标题最大字数
  max_title_length: 15

# ===== 品类配色方案 =====
# 根据 account.category 自动选择
color_schemes:
  beauty:
    bg_color: "#FFF5F5"      # 玫瑰粉背景
    text_color: "#2D2D2D"    # 深色文字
    accent_color: "#E8668A"  # 玫红强调
    description: "柔美优雅"

  fashion:
    bg_color: "#F8F5FF"      # 薰衣草背景
    text_color: "#2D2D2D"
    accent_color: "#7C5CFC"  # 紫色强调
    description: "潮流时尚"

  fitness:
    bg_color: "#F0FFF4"      # 薄荷绿背景
    text_color: "#2D2D2D"
    accent_color: "#38B2AC"  # 青色强调
    description: "活力清爽"

  education:
    bg_color: "#F0F7FF"      # 天蓝背景
    text_color: "#2D2D2D"
    accent_color: "#3182CE"  # 蓝色强调
    description: "专业可信"

  daily:
    bg_color: "#FFFDF5"      # 暖米背景
    text_color: "#2D2D2D"
    accent_color: "#D69E2E"  # 金色强调
    description: "温馨舒适"

  relationship:
    bg_color: "#FFF5F7"      # 浅粉背景
    text_color: "#2D2D2D"
    accent_color: "#ED64A6"  # 粉色强调
    description: "温柔走心"

  career:
    bg_color: "#F7FAFC"      # 冷灰背景
    text_color: "#2D2D2D"
    accent_color: "#2B6CB0"  # 海军蓝强调
    description: "专业锐利"

  travel:
    bg_color: "#F0FFF4"      # 浅绿背景
    text_color: "#2D2D2D"
    accent_color: "#38A169"  # 绿色强调
    description: "自由清新"

# ===== 发布设置 =====
publish:
  # 是否保存到草稿箱（true）还是直接发布（false）
  save_draft: true

  # 发布后是否自动打开小红书APP
  auto_open_app: false

# ===== 输出目录 =====
output:
  # 生成的图片保存目录
  images_dir: "./output/images"

  # 生成的文案保存目录
  content_dir: "./output/content"

  # 是否保留生成的中间文件
  keep_temp_files: false
